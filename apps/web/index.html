<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Cloudflare Blog Template</title>
    <meta
      name="description"
      content="자동화·SEO·CTR 운영 구조를 포함한 Cloudflare 블로그 템플릿"
    />
    <meta name="robots" content="index,follow" />

    <link rel="preconnect" href="https://api.example.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.example.com" />
    <link rel="canonical" href="https://example.com/ko/" />

    <meta property="og:title" content="Cloudflare Blog Template" />
    <meta
      property="og:description"
      content="자동화 게시 파이프라인과 SEO/CTR 운영 기준을 반영한 재사용 템플릿"
    />
    <meta property="og:site_name" content="Cloudflare Blog Template" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/ko/" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:image" content="https://example.com/og-default.svg" />

    <link rel="alternate" type="application/rss+xml" title="Template RSS" href="/rss.xml" />
    <link rel="alternate" type="application/rss+xml" title="Template Feed" href="/feed.xml" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cloudflare Blog Template" />
    <meta
      name="twitter:description"
      content="자동화·SEO·CTR 중심 Cloudflare 블로그 템플릿"
    />
    <meta name="twitter:image" content="https://example.com/og-default.svg" />

    <script id="structured-data" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Cloudflare Blog Template",
        "alternateName": "DonggriArchive Template",
        "url": "https://example.com/ko/",
        "description": "자동화·SEO·CTR 운영 구조를 반영한 Cloudflare 블로그 템플릿",
        "inLanguage": "ko-KR"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
